<!DOCTYPE html>
<html>
<head><title>Export Icon</title></head>
<body>
<canvas id="c" width="512" height="512" style="display:none"></canvas>
<script>
const canvas = document.getElementById('c')
const ctx = canvas.getContext('2d')
const size = 512
const r = size * 0.25 // border radius

// Background rounded rect
ctx.beginPath()
ctx.moveTo(r, 0)
ctx.lineTo(size - r, 0)
ctx.quadraticCurveTo(size, 0, size, r)
ctx.lineTo(size, size - r)
ctx.quadraticCurveTo(size, size, size - r, size)
ctx.lineTo(r, size)
ctx.quadraticCurveTo(0, size, 0, size - r)
ctx.lineTo(0, r)
ctx.quadraticCurveTo(0, 0, r, 0)
ctx.closePath()
ctx.fillStyle = '#F97316'
ctx.fill()

// Scale factor: original viewBox 32x32, canvas 512x512
const s = 512 / 32

ctx.strokeStyle = 'white'
ctx.lineWidth = 2.5 * s
ctx.lineCap = 'round'
ctx.lineJoin = 'round'

// Polyline: 6,22 -> 12,15 -> 18,17 -> 26,8
ctx.beginPath()
ctx.moveTo(6 * s, 22 * s)
ctx.lineTo(12 * s, 15 * s)
ctx.lineTo(18 * s, 17 * s)
ctx.lineTo(26 * s, 8 * s)
ctx.stroke()

// Circle at 26,8 r=2.5
ctx.beginPath()
ctx.arc(26 * s, 8 * s, 2.5 * s, 0, Math.PI * 2)
ctx.fillStyle = 'white'
ctx.fill()

// Download
const link = document.createElement('a')
link.download = 'scalelab-icon.png'
link.href = canvas.toDataURL('image/png')
link.click()
document.body.innerHTML = '<p style="font-family:sans-serif;padding:40px;color:#1C1917">✅ PNG téléchargé !</p>'
</script>
</body>
</html>
